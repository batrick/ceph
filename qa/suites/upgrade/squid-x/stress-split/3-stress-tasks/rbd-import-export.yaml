meta:
- desc: |
   run basic import/export cli tests for rbd
overrides:
  ceph:
    log-ignorelist:
      # TestLibRBD.RemoveFullTryDataPool
      - POOL_FULL
      - is full
stress-tasks:
- workunit:
    branch: squid
    clients:
      client.0:
        - rbd/import_export.sh
    env:
      RBD_CREATE_ARGS: --new-format
- print: "**** done rbd/import_export.sh 5-workload"
