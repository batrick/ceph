meta:
- desc: |
   run basic import/export cli tests for rbd
overrides:
  ceph:
    log-ignorelist:
      # TestLibRBD.RemoveFullTryDataPool
      - POOL_FULL
      - pool.*full
      - is full
workload:
  full_sequential:
    - print: "**** done start rbd_import_export.yaml"
    - workunit:
        branch: tentacle
        clients:
          client.1:
              - rbd/import_export.sh
        env:
          RBD_CREATE_ARGS: --new-format
    - print: "**** done end rbd_import_export.yaml"
