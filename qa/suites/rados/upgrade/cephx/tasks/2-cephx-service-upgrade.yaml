tasks:
- full_sequential_finally:
  - exec:
      mon.a:
        - sleep 1h
- exec:
    mon.a:
      - ceph config dump
      - ceph auth ls
- ceph.key_rotate:
    daemons: [mgr.*, osd.*, mds.*]
    key_type: aes256k
- exec:
    mon.a:
      - ceph auth ls
      - ceph config set global auth_service_cipher aes256k
- sleep:
    duration: 60
- radosbench:
    clients: [client.0]
    time: 150
    unique_pool: true
